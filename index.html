<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Popup Widget</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>

  <!-- Кнопка-триггер для открытия (имитация действия на сайте) -->
  <button id="open-modal-btn" class="primary-btn">Купить билеты</button>

  <!-- Само модальное окно (скрыто по умолчанию классом .hidden) -->
  <div id="modal-overlay" class="modal-overlay hidden">
    <div class="modal-content">
      <h2>Переход к бронированию</h2>
      <p>Для продолжения необходимо дать согласие на обработку персональных данных.</p>
      
      <label class="checkbox-label">
        <input type="checkbox" id="agree-checkbox">
        <span>Я согласен на обработку данных</span>
      </label>

      <!-- Кнопка изначально неактивна (disabled) -->
      <button id="submit-btn" class="primary-btn" disabled>
        Перейти к Яндекс.Билетам
        </button>
      
      <button id="close-modal-btn" class="text-btn">Закрыть</button>
    </div each>
  </div>

  <script src="popup.js" defer></script>
</body>
</html>
